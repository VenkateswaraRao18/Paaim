# PAAIM — the whole product, one command.
#
#   Laptop:   docker compose up --build            → http://localhost:3000
#   AWS/EC2:  PAAIM_HOST=<public-ip> docker compose up --build
#                                                   → http://<public-ip>:3000
#
# PAAIM_HOST is the single knob. It defaults to localhost, so the laptop path is
# unchanged; on a server it is the address the BROWSER will use to reach the box.
# It must be set at build time, because the frontend inlines the API URL when it
# compiles (NEXT_PUBLIC_*). Getting this wrong is the one thing that breaks a
# cloud deploy: with the default, every API call from a remote browser resolves
# to the viewer's OWN machine, not the server.
#
# Everything a larger deployment would have to externalise — SQLite, the tenant
# state files, the in-memory event bus, the single-process watchers — is exactly
# right on one box. No Postgres, no Redis, no broker. One volume. It runs as a
# single instance by design; that is fine for a demo and for one plant, and is
# the thing to revisit before scaling out (see DEPLOY_AWS.md).

services:
  # ── The two simulated plants ────────────────────────────────────────────
  # One image, two plants: a dairy and a machine shop that share nothing but
  # the code. That is the demo.
  stream-food:
    build: ./factory-stream
    environment:
      STREAM_PLANT: food            # °F, psi, grams — two signals fail LOW
      STREAM_PORT: "9100"
    ports: ["9100:9100"]            # published only so you can curl it

  stream-cnc:
    build: ./factory-stream
    environment:
      STREAM_PLANT: cnc             # °C, bar, kW
      STREAM_PORT: "9101"
    ports: ["9101:9101"]

  # ── The API ─────────────────────────────────────────────────────────────
  api:
    build: ./backend
    environment:
      # Optional. Without it the agents fall back to deterministic rules and
      # say so on screen — the product runs, the reasoning just isn't Gemini's.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-dev-only-not-a-production-secret}
      # Must match the address the browser loads the web app from, or the
      # browser blocks every response as cross-origin.
      CORS_ORIGINS: http://${PAAIM_HOST:-localhost}:3000
      # Container names, not localhost: inside this network `localhost:9100`
      # would mean the API container itself. The seeder connects the sources
      # using these, so nobody has to know that.
      DEMO_STREAM_FOOD: http://stream-food:9100
      DEMO_STREAM_CNC: http://stream-cnc:9101
    volumes:
      - paaim-data:/data            # SQLite + tenant vocabularies/mappings + bus log
    ports: ["8000:8000"]
    depends_on: [stream-food, stream-cnc]
    # Seed two tenants and their whole setup, then serve. Both seeders are
    # idempotent, so this is safe on every `up`.
    command: >
      sh -c "python seed_tenants.py &&
             uvicorn paaim.main:app --host 0.0.0.0 --port 8000 &
             sleep 6 && python commission_demo.py; wait"

  # ── The web app ─────────────────────────────────────────────────────────
  web:
    build:
      context: ./frontend
      args:
        # The address the BROWSER uses to reach the API — the server's public
        # host, not `api:8000` (that name only exists inside this network) and
        # not localhost (that would be the viewer's own machine). Inlined at
        # build time, so changing PAAIM_HOST needs a rebuild, not just a restart.
        NEXT_PUBLIC_API_URL: http://${PAAIM_HOST:-localhost}:8000/api
    ports: ["3000:3000"]
    depends_on: [api]

volumes:
  paaim-data:
