apiVersion: v1
kind: Service
metadata:
  name: {{ include "paaim.fullname" . }}-api
  labels:
    {{- include "paaim.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "paaim.selectorLabels" . | nindent 4 }}
    component: api
