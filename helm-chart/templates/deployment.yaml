apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "paaim.fullname" . }}-api
  labels:
    {{- include "paaim.labels" . | nindent 4 }}
    component: api
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "paaim.selectorLabels" . | nindent 6 }}
      component: api
  template:
    metadata:
      labels:
        {{- include "paaim.selectorLabels" . | nindent 8 }}
        component: api
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
      - name: api
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        - name: ENVIRONMENT
          value: "{{ .Values.env[0].value }}"
        - name: LOG_LEVEL
          value: "{{ .Values.env[1].value }}"
        - name: DATABASE_URL
          value: "postgresql://{{ .Values.database.user }}:$(POSTGRES_PASSWORD)@{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}"
        - name: REDIS_URL
          value: "redis://{{ .Values.redis.host }}:{{ .Values.redis.port }}/0"
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "paaim.fullname" . }}-secrets
              key: jwt-secret-key
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "paaim.fullname" . }}-secrets
              key: anthropic-api-key
        - name: MES_HOST
          value: "{{ .Values.connectors.mes.host }}"
        - name: MES_PORT
          value: "{{ .Values.connectors.mes.port }}"
        - name: CMMS_HOST
          value: "{{ .Values.connectors.cmms.host }}"
        - name: CMMS_PORT
          value: "{{ .Values.connectors.cmms.port }}"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "paaim.fullname" . }}-secrets
              key: postgres-password
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 12 }}
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 12 }}
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
